default_max_lines = 500
respect_gitignore = true
exclude = ["**/uv.lock", "**/.git/**", "**/docs/**"]

# Source files get a higher default limit (750)
[[rules]]
path = "src/**/*.py"
max_lines = 750

# Source files that still need exceptions above 750
[[rules]]
path = "src/docket/worker.py"
max_lines = 1388

[[rules]]
path = "src/docket/cli/__init__.py"
max_lines = 945

[[rules]]
path = "src/docket/execution.py"
max_lines = 1335

[[rules]]
path = "src/docket/docket.py"
max_lines = 1098

[[rules]]
path = "src/docket/_redis.py"
max_lines = 940

[[rules]]
path = "src/docket/dependencies/_concurrency.py"
max_lines = 867

[[rules]]
path = "tests/instrumentation/test_counters.py"
max_lines = 544
